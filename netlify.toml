[build]
  publish = "public"
  functions = "netlify/functions"
  # No build step required for static site
  command = "echo 'No build step required - static site'"

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.ipify.org; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"

# Headers for static assets (cache)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API routes redirect
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback - redirect non-file requests to index.html
# Netlify serves static files first, so this only applies to non-existent routes
# The force = false ensures existing files are served directly
# Important: This must be the last redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {}

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]

# Plugins configuration
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Cypress plugin - configured to run tests
# Tests run after the site is deployed
[[plugins]]
  package = "netlify-plugin-cypress"
  [plugins.inputs]
    record = false

