<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - منصة نشر الأبحاث العربية</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Logo & Title -->
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <img src="/images/logo.png" alt="Research Assistant Logo" class="auth-logo-img">
                </a>
                <div class="auth-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1>استعادة كلمة المرور</h1>
                <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور</p>
            </div>

            <!-- Alert Container -->
            <div id="alert-container"></div>

            <!-- Forgot Password Form -->
            <form id="forgot-password-form" class="auth-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label required">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="example@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-large btn-block" id="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    <span>إرسال رابط الاستعادة</span>
                </button>
            </form>

            <!-- Success Message (Hidden by default) -->
            <div id="success-message" class="success-box" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <h3>تم إرسال البريد بنجاح!</h3>
                <p>تحقق من بريدك الإلكتروني واتبع التعليمات لإعادة تعيين كلمة المرور</p>
                <p class="text-secondary">لم تستلم البريد؟ تحقق من مجلد الرسائل غير المرغوب فيها</p>
            </div>

            <!-- Back Links -->
            <div class="auth-footer">
                <a href="/pages/login.html" class="link-primary">
                    <i class="fas fa-arrow-right"></i>
                    العودة لتسجيل الدخول
                </a>
            </div>

            <!-- Back to Home -->
            <div class="auth-back">
                <a href="/">
                    <i class="fas fa-arrow-right"></i>
                    العودة للصفحة الرئيسية
                </a>
            </div>
        </div>

        <!-- Decorative Background -->
        <div class="auth-bg">
            <div class="auth-bg-circle circle-1"></div>
            <div class="auth-bg-circle circle-2"></div>
            <div class="auth-bg-circle circle-3"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/auth/forgot-password.js"></script>
</body>
</html>
