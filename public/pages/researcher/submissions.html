<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>طلباتي - منصة نشر الأبحاث العربية</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css?v=2.0">
    <link rel="stylesheet" href="/css/dashboard.css?v=2.0">
    <link rel="stylesheet" href="/css/chat.css?v=2.0">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="/images/logo.png" alt="Research Assistant Logo" class="sidebar-logo" style="max-width: 120px;">
            <h2>لوحة الباحث</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/pages/researcher/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="/pages/researcher/submit.html" class="nav-item">
                <i class="fas fa-plus-circle"></i>
                <span>تقديم بحث</span>
            </a>
            <a href="/pages/researcher/submissions.html" class="nav-item active">
                <i class="fas fa-folder-open"></i>
                <span>طلباتي</span>
            </a>
            <a href="/pages/researcher/profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>الملف الشخصي</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="topbar-title">
                <h1>طلباتي</h1>
            </div>

            <div class="topbar-actions">
                <!-- Chat -->
                <button class="topbar-icon-btn" id="chat-btn">
                    <i class="fas fa-comments"></i>
                    <span class="notification-badge" id="chat-badge" style="display: none;">0</span>
                </button>
                
                <!-- Notifications -->
                <button class="topbar-icon-btn" id="notifications-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notification-badge" style="display: none;">0</span>
                </button>
                
                <a href="/pages/researcher/submit.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    تقديم بحث جديد
                </a>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Filters -->
            <div class="card">
                <div class="card-body">
                    <div class="filters-row">
                        <div class="form-group" style="margin: 0;">
                            <select id="status-filter" class="form-select">
                                <option value="">جميع الحالات</option>
                                <option value="pending">قيد المراجعة</option>
                                <option value="approved">مقبول</option>
                                <option value="rejected">مرفوض</option>
                                <option value="needs_revision">يحتاج مراجعة</option>
                                <option value="draft">مسودة</option>
                            </select>
                        </div>
                        
                        <div class="form-group" style="margin: 0;">
                            <select id="sort-filter" class="form-select">
                                <option value="created_at_desc">الأحدث أولاً</option>
                                <option value="created_at_asc">الأقدم أولاً</option>
                                <option value="status">حسب الحالة</option>
                            </select>
                        </div>
                        
                        <div class="search-box" style="flex: 1;">
                            <input type="text" id="search-input" class="form-input" placeholder="ابحث بالاسم أو الرقم المرجعي...">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submissions List -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-list"></i>
                        قائمة الطلبات
                    </h3>
                    <span class="badge badge-primary" id="total-count">0 طلب</span>
                </div>
                <div class="card-body">
                    <div id="submissions-list">
                        <!-- Loading -->
                        <div class="loading-placeholder">
                            <div class="loading-spinner"></div>
                            <p>جاري التحميل...</p>
                        </div>
                    </div>
                    
                    <!-- Pagination -->
                    <div id="pagination" class="pagination" style="display: none;">
                        <button class="btn btn-ghost btn-small" id="prev-page" disabled>
                            <i class="fas fa-chevron-right"></i>
                            السابق
                        </button>
                        <span id="page-info">صفحة 1 من 1</span>
                        <button class="btn btn-ghost btn-small" id="next-page" disabled>
                            التالي
                            <i class="fas fa-chevron-left"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Developer Credit -->
            <div class="developer-credit" style="margin-top: 2rem;">
                <a href="https://wa.me/966533189111" target="_blank" rel="noopener noreferrer" class="developer-credit-content">
                    <img src="/images/logob.png" alt="باكورة التقنيات" class="developer-logo" width="24" height="24" loading="lazy" onerror="this.style.display='none'">
                    <span>تم تطوير المنصة بواسطة الحاضنة الرقمية باكورة التقنيات</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Scripts -->
    <script type="module" src="/js/main.js?v=2.0"></script>
    <script type="module" src="/js/researcher/common.js?v=2.0"></script>
    <script type="module" src="/js/researcher/submissions.js?v=2.0"></script>
    <script type="module">
        import { initNotificationDropdown } from '/js/utils/notification-dropdown.js';
        document.addEventListener('DOMContentLoaded', async () => {
            await initNotificationDropdown();
        });
    </script>
    
    <style>
        .filters-row {
            display: grid;
            grid-template-columns: 200px 200px 1fr;
            gap: var(--spacing-md);
            align-items: center;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            padding-left: 2.5rem;
        }
        
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }
        
        @media (max-width: 768px) {
            .filters-row {
                grid-template-columns: 1fr;
            }
            
            .topbar-actions .btn {
                padding: 0.5rem;
            }
            
            .topbar-actions .btn span {
                display: none;
            }
        }
    </style>
</body>
</html>
