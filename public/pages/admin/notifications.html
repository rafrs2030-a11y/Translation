<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات - لوحة تحكم المسؤول</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/admin-enhanced.css">
    
    <style>
        .notification-filters {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-lg);
        }

        .filter-btn {
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px solid var(--border-color);
            background: white;
            border-radius: var(--radius-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: var(--font-family);
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            background: rgba(61, 90, 148, 0.05);
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-count {
            background: rgba(0, 0, 0, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .filter-btn.active .filter-count {
            background: rgba(255, 255, 255, 0.3);
        }

        .notifications-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .notification-item {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            display: flex;
            gap: var(--spacing-md);
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-item.unread {
            background: rgba(61, 90, 148, 0.03);
            border-right: 4px solid var(--primary-color);
        }

        .notification-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .notification-icon.new_submission {
            background: rgba(61, 90, 148, 0.1);
            color: var(--primary-color);
        }

        .notification-icon.status_change {
            background: rgba(232, 154, 60, 0.1);
            color: var(--warning-color);
        }

        .notification-icon.comment_added {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .notification-icon.system {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-secondary);
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .notification-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
            color: var(--text-primary);
        }

        .notification-time {
            color: var(--text-light);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .notification-message {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .notification-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .notification-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }

        .notification-actions button {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-family);
        }

        .btn-view {
            background: var(--primary-color);
            color: white;
        }

        .btn-view:hover {
            background: var(--primary-light);
        }

        .btn-mark-read {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-mark-read:hover {
            background: var(--success-color);
            color: white;
        }

        .btn-delete {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .btn-delete:hover {
            background: var(--error-color);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        .loading-placeholder {
            text-align: center;
            padding: 3rem 1rem;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(61, 90, 148, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .notification-filters {
                overflow-x: auto;
                padding-bottom: var(--spacing-sm);
            }

            .filter-btn {
                white-space: nowrap;
            }

            .notification-item {
                flex-direction: column;
            }

            .notification-header {
                flex-direction: column;
                gap: 0.5rem;
            }

            .topbar-actions span {
                display: none;
            }
        }
    </style>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="/images/logo.png" alt="Research Assistant Logo" class="sidebar-logo" style="max-width: 120px;">
            <h2>لوحة المسؤول</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/pages/admin/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="/pages/admin/submissions.html" class="nav-item">
                <i class="fas fa-folder-open"></i>
                <span>إدارة الطلبات</span>
            </a>
            <a href="/pages/admin/users.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>إدارة المستخدمين</span>
            </a>
            <a href="/pages/admin/notifications.html" class="nav-item active">
                <i class="fas fa-bell"></i>
                <span>الإشعارات</span>
                <span class="badge" id="sidebar-notification-count">0</span>
            </a>
            <a href="/pages/admin/statistics.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>الإحصائيات</span>
            </a>
            <a href="/pages/admin/reports.html" class="nav-item">
                <i class="fas fa-file-export"></i>
                <span>التقارير</span>
            </a>
            <a href="/pages/admin/settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>الإعدادات</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>الإشعارات</h1>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-outline" id="mark-all-read">
                    <i class="fas fa-check-double"></i>
                    <span>تعليم الكل كمقروء</span>
                </button>
                <button class="btn btn-ghost" id="clear-all">
                    <i class="fas fa-trash-alt"></i>
                    <span>مسح الكل</span>
                </button>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div class="dashboard-container">
            <!-- Filters -->
            <div class="card">
                <div class="card-body">
                    <div class="notification-filters">
                        <button class="filter-btn active" data-filter="all">
                            <i class="fas fa-inbox"></i>
                            الكل
                            <span class="filter-count" id="count-all">0</span>
                        </button>
                        <button class="filter-btn" data-filter="unread">
                            <i class="fas fa-envelope"></i>
                            غير مقروء
                            <span class="filter-count" id="count-unread">0</span>
                        </button>
                        <button class="filter-btn" data-filter="new_submission">
                            <i class="fas fa-file-plus"></i>
                            طلبات جديدة
                        </button>
                        <button class="filter-btn" data-filter="status_change">
                            <i class="fas fa-exchange-alt"></i>
                            تغيير الحالة
                        </button>
                        <button class="filter-btn" data-filter="comment_added">
                            <i class="fas fa-comment"></i>
                            تعليقات
                        </button>
                        <button class="filter-btn" data-filter="system">
                            <i class="fas fa-cog"></i>
                            النظام
                        </button>
                    </div>
                </div>
            </div>

            <!-- Notifications List -->
            <div class="card">
                <div class="card-body">
                    <div id="notifications-container">
                        <!-- Loading Spinner -->
                        <div class="loading-placeholder">
                            <div class="loading-spinner"></div>
                            <p>جاري تحميل الإشعارات...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="btn btn-ghost" id="load-more">
                    <i class="fas fa-sync"></i>
                    تحميل المزيد
                </button>
            </div>
            
            <!-- Developer Credit -->
            <div class="developer-credit" style="margin-top: 2rem;">
                <a href="https://cv-omar-alodaini.netlify.app" target="_blank" rel="noopener noreferrer">
                    تطوير: عمر العديني
                </a>
            </div>
        </div>
    </main>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Scripts -->
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/admin/notifications.js"></script>
</body>
</html>
