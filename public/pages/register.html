<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة نشر الأبحاث العربية</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card register-card">
            <!-- Logo & Title -->
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <img src="/images/logo.png" alt="Research Assistant Logo" class="auth-logo-img">
                </a>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلى آلاف الباحثين العرب</p>
            </div>

            <!-- Alert Container -->
            <div id="alert-container"></div>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="full_name" class="form-label required">الاسم الكامل</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="full_name" 
                            name="full_name" 
                            class="form-input"
                            placeholder="أدخل اسمك الكامل"
                            required
                        >
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label required">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="example@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <small class="form-help">سنرسل رابط التحقق إلى هذا البريد</small>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone" class="form-label required">رقم الجوال</label>
                    <div class="input-with-icon">
                        <i class="fas fa-phone"></i>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            class="form-input"
                            placeholder="+966 50 123 4567"
                            required
                        >
                    </div>
                </div>

                <!-- National ID -->
                <div class="form-group">
                    <label for="national_id" class="form-label required">رقم الهوية / الإقامة</label>
                    <div class="input-with-icon">
                        <i class="fas fa-id-card"></i>
                        <input 
                            type="text" 
                            id="national_id" 
                            name="national_id" 
                            class="form-input"
                            placeholder="1234567890"
                            required
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label required">كلمة المرور</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input"
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-password" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text"></span>
                    </div>
                    <small class="form-help">
                        يجب أن تحتوي على 8 أحرف على الأقل، حرف كبير، رقم، ورمز خاص
                    </small>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirm_password" class="form-label required">تأكيد كلمة المرور</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="confirm_password" 
                            name="confirm_password" 
                            class="form-input"
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-password" data-target="confirm_password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            أوافق على 
                            <a href="#" class="link-primary">الشروط والأحكام</a>
                            و
                            <a href="#" class="link-primary">سياسة الخصوصية</a>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-large btn-block" id="submit-btn">
                    <i class="fas fa-user-plus"></i>
                    <span>إنشاء الحساب</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>أو</span>
            </div>

            <!-- Login Link -->
            <div class="auth-footer">
                <p>لديك حساب بالفعل؟</p>
                <a href="/pages/login.html" class="btn btn-outline btn-block">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </a>
            </div>

            <!-- Back to Home -->
            <div class="auth-back">
                <a href="/">
                    <i class="fas fa-arrow-right"></i>
                    العودة للصفحة الرئيسية
                </a>
            </div>
        </div>

        <!-- Decorative Background -->
        <div class="auth-bg">
            <div class="auth-bg-circle circle-1"></div>
            <div class="auth-bg-circle circle-2"></div>
            <div class="auth-bg-circle circle-3"></div>
        </div>
    </div>

    <!-- Developer Credit -->
    <div class="developer-credit">
        <a href="https://cv-omar-alodaini.netlify.app" target="_blank" rel="noopener noreferrer">
            تطوير: عمر العديني
        </a>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/auth/register.js"></script>
</body>
</html>
