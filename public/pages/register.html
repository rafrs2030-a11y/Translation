    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">

    <link rel="icon" type="image/png" href="/images/logo.png">

<body class="auth-page">
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card register-card">
            <!-- Logo & Title -->
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <img src="/images/logo.png" alt="Research Assistant Logo" class="auth-logo-img">
                </a>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلى آلاف الباحثين العرب</p>
            </div>

            <!-- Alert Container -->
            <div id="alert-container"></div>

            <!-- Account Type Selection -->
            <div id="account-type-selection" class="account-type-selection">
                <h3 class="account-type-title">اختر نوع الحساب</h3>
                <div class="account-type-options">
                    <div class="account-type-option" data-type="أفراد">
                        <div class="account-type-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="account-type-label">أفراد</div>
                    </div>
                    <div class="account-type-option" data-type="أعمال">
                        <div class="account-type-icon">
                            <i class="fas fa-building"></i>
                        </div>
                        <div class="account-type-label">أعمال</div>
                    </div>
                </div>
                <input type="hidden" id="account_type" name="account_type" required>
            </div>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display: none;">
                <!-- Individual Fields (أفراد) -->
                <div id="individual-fields">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="full_name" class="form-label required">الاسم الكامل</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input 
                                type="text" 
                                id="full_name" 
                                name="full_name" 
                                class="form-input"
                                placeholder="أدخل اسمك الكامل"
                            >
                        </div>
                    </div>

                    <!-- National ID -->
                    <div class="form-group">
                        <label for="national_id" class="form-label required">رقم الهوية / الإقامة / الجواز</label>
                        <div class="input-with-icon">
                            <i class="fas fa-id-card"></i>
                            <input 
                                type="text" 
                                id="national_id" 
                                name="national_id" 
                                class="form-input"
                                placeholder="1234567890"
                            >
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="form-group">
                        <label for="gender" class="form-label required">الجنس</label>
                        <div class="input-with-icon">
                            <i class="fas fa-venus-mars"></i>
                            <select 
                                id="gender" 
                                name="gender" 
                                class="form-select"
                            >
                                <option value="">اختر...</option>
                                <option value="ذكر">ذكر</option>
                                <option value="أنثى">أنثى</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Business Fields (أعمال) -->
                <div id="business-fields" style="display: none;">
                    <!-- Organization Name -->
                    <div class="form-group">
                        <label for="organization_name" class="form-label required">اسم الجهة</label>
                        <div class="input-with-icon">
                            <i class="fas fa-building"></i>
                            <input 
                                type="text" 
                                id="organization_name" 
                                name="organization_name" 
                                class="form-input"
                                placeholder="أدخل اسم الجهة"
                            >
                        </div>
                    </div>

                    <!-- Organization Type -->
                    <div class="form-group">
                        <label for="organization_type" class="form-label required">نوع الجهة</label>
                        <div class="input-with-icon">
                            <i class="fas fa-briefcase"></i>
                            <select 
                                id="organization_type" 
                                name="organization_type" 
                                class="form-select"
                            >
                                <option value="">اختر نوع الجهة</option>
                                <option value="جامعة">جامعة</option>
                                <option value="هيئة">هيئة</option>
                                <option value="جهات حكومية">جهات حكومية</option>
                                <option value="قطاع خاص">قطاع خاص</option>
                            </select>
                        </div>
                    </div>

                </div>

                <!-- Common Fields (for both types) -->
                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label required">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="example@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <small class="form-help">سنرسل رابط التحقق إلى هذا البريد</small>
                </div>

                    <label for="phone" class="form-label required">رقم الجوال</label>

                        <i class="fas fa-phone"></i>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            class="form-input"
                            placeholder="+966 50 123 4567"
                            required
                        >
                    </div>
                </div>

                            required
                            autocomplete="new-password"
                        >

                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text"></span>
                    </div>
